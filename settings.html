<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Housekeeping Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <style> .tabs-nav{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto} .tabs-nav button{min-height:40px;background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;font-weight:600;color:var(--slate);cursor:pointer;white-space:nowrap} .tabs-nav button.active{color:var(--accent-dark);border-bottom-color:var(--accent)} </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-head"><div class="titles"><div class="breadcrumb">Housekeeping Hub</div><h1>Settings</h1></div></div>
      <div class="tabs-nav">
        <button data-t="hotel" class="active">Hotel</button><button data-t="checklists">Checklists</button><button data-t="rooms">Rooms</button><button data-t="users">Users</button><button data-t="branding">Branding</button><button data-t="export">Data export</button><button data-t="audit">Audit log</button>
      </div>
      <div id="pane">Loading...</div>
    </main>
  </div>
  <div id="toast-host"></div>
  <div id="modal-host"></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script>
  (function () {
    var hotel = null, cur = "hotel";
    HK.requireAuth(["admin"], function (state) {
      if (!state.hotelId) { window.location.href = "onboarding.html"; return; }
      HK.mount("settings");
      HK.hotelRef().get().then(function (h) { hotel = h.data(); hotel.settings = hotel.settings || {}; render(); }).catch(function (err) { document.getElementById("pane").innerHTML = "<p class=\"muted\">" + HK.esc(err.message) + "</p>"; });
    });
    var btns = document.querySelectorAll(".tabs-nav button");
    for (var i = 0; i < btns.length; i++) { btns[i].onclick = (function (b) { return function () { cur = b.getAttribute("data-t"); setActive(); render(); }; })(btns[i]); }
    function setActive() { var bs = document.querySelectorAll(".tabs-nav button"); for (var j = 0; j < bs.length; j++) { bs[j].className = (bs[j].getAttribute("data-t") === cur) ? "active" : ""; } }
    function render() { var p = document.getElementById("pane"); if (!hotel) { p.innerHTML = "Loading..."; return; } p.innerHTML = ""; if (cur === "hotel") { renderHotel(p); } else if (cur === "checklists") { renderChecklists(p); } else if (cur === "rooms") { renderRooms(p); } else if (cur === "users") { renderUsers(p); } else if (cur === "branding") { renderBranding(p); } else if (cur === "export") { renderExport(p); } else if (cur === "audit") { renderAudit(p); } }
    function renderHotel(p) {
      var c = document.createElement("div"); c.className = "card";
      c.innerHTML = "<div class=\"card-title\">Hotel details</div><div class=\"field\"><label>Name</label><input id=\"hName\" value=\"" + HK.esc(hotel.name) + "\"></div><div class=\"field\"><label>Address</label><input id=\"hAddr\" value=\"" + HK.esc(hotel.address || "") + "\"></div><div class=\"field-row\"><div class=\"field\"><label>Floors</label><input id=\"hFloors\" type=\"number\" value=\"" + (hotel.floorsCount || 1) + "\"></div><div class=\"field\"><label>Deep clean interval (days)</label><input id=\"hInterval\" type=\"number\" value=\"" + (hotel.settings.deepCleanIntervalDays || 90) + "\"></div></div><button class=\"btn btn-accent\" id=\"saveHotel\">Save</button>";
      p.appendChild(c);
      document.getElementById("saveHotel").onclick = function () { var btn = this; btn.disabled = true; btn.textContent = "Saving..."; HK.hotelRef().update({ name: document.getElementById("hName").value.trim(), address: document.getElementById("hAddr").value.trim(), floorsCount: parseInt(document.getElementById("hFloors").value, 10) || 1, "settings.deepCleanIntervalDays": parseInt(document.getElementById("hInterval").value, 10) || 90 }).then(function () { hotel.name = document.getElementById("hName").value.trim(); HK.audit("settings.changed", "Hotel details updated"); HK.toast("Saved.", "success"); btn.disabled = false; btn.textContent = "Save"; }).catch(function (err) { btn.disabled = false; btn.textContent = "Save"; HK.toast("Save failed: " + err.message, "error"); }); };
    }
    function renderChecklists(p) {
      var daily = (hotel.settings.dailyChecklist || []).slice(); var deep = (hotel.settings.deepCleanChecklist || []).slice();
      var c = document.createElement("div"); c.className = "card"; c.innerHTML = "<div class=\"card-title\">Daily clean checklist</div><div id=\"dailyL\"></div><div class=\"row mt8\"><input id=\"dailyN\" placeholder=\"Add task\"><button class=\"btn btn-secondary btn-sm\" id=\"addD\">Add</button></div>";
      var c2 = document.createElement("div"); c2.className = "card"; c2.innerHTML = "<div class=\"card-title\">Deep clean checklist</div><div id=\"deepL\"></div><div class=\"row mt8\"><input id=\"deepN\" placeholder=\"Add task\"><button class=\"btn btn-secondary btn-sm\" id=\"addDp\">Add</button></div>";
      var save = document.createElement("button"); save.className = "btn btn-accent mt16"; save.textContent = "Save checklists";
      p.appendChild(c); p.appendChild(c2); p.appendChild(save);
      function drawList(id, arr) { var host = document.getElementById(id); host.innerHTML = ""; arr.forEach(function (item, idx) { var row = document.createElement("div"); row.className = "checkitem"; var up = idx > 0 ? "<button class=\"btn btn-sm btn-secondary\" data-a=\"up\">\u2191</button>" : ""; row.innerHTML = "<span class=\"grow\">" + HK.esc(item) + "</span>"; var upB = document.createElement("button"); upB.className = "btn btn-sm btn-secondary"; upB.textContent = "Up"; upB.disabled = idx === 0; upB.onclick = function () { var t = arr[idx - 1]; arr[idx - 1] = arr[idx]; arr[idx] = t; drawList(id, arr); }; var del = document.createElement("button"); del.className = "btn btn-sm btn-danger"; del.textContent = "Remove"; del.onclick = function () { arr.splice(idx, 1); drawList(id, arr); }; row.appendChild(upB); row.appendChild(del); host.appendChild(row); }); }
      drawList("dailyL", daily); drawList("deepL", deep);
      document.getElementById("addD").onclick = function () { var v = document.getElementById("dailyN").value.trim(); if (v) { daily.push(v); document.getElementById("dailyN").value = ""; drawList("dailyL", daily); } };
      document.getElementById("addDp").onclick = function () { var v = document.getElementById("deepN").value.trim(); if (v) { deep.push(v); document.getElementById("deepN").value = ""; drawList("deepL", deep); } };
      save.onclick = function () { save.disabled = true; save.textContent = "Saving..."; HK.hotelRef().update({ "settings.dailyChecklist": daily, "settings.deepCleanChecklist": deep }).then(function () { hotel.settings.dailyChecklist = daily; hotel.settings.deepCleanChecklist = deep; HK.audit("settings.changed", "Checklists updated"); HK.toast("Checklists saved.", "success"); save.disabled = false; save.textContent = "Save checklists"; }).catch(function (err) { save.disabled = false; save.textContent = "Save checklists"; HK.toast("Save failed: " + err.message, "error"); }); };
    }
    function renderRooms(p) {
      var c = document.createElement("div"); c.className = "card"; c.innerHTML = "<div class=\"card-title\">Room manager</div><div class=\"field-row\"><div class=\"field\"><label>Room number</label><input id=\"rNum\"></div><div class=\"field\"><label>Floor</label><input id=\"rFloor\" type=\"number\" value=\"1\"></div><div class=\"field\"><label>Type</label><select id=\"rType\"><option>double</option><option>single</option><option>twin</option><option>suite</option><option>family</option><option>accessible</option></select></div></div><button class=\"btn btn-accent btn-sm\" id=\"addRoom\">Add room</button><div id=\"roomList\" class=\"mt16\">Loading...</div>";
      p.appendChild(c);
      document.getElementById("addRoom").onclick = function () { var num = document.getElementById("rNum").value.trim(); if (!num) { HK.toast("Enter a room number.", "error"); return; } HK.col("rooms").add({ roomNumber: num, floor: parseInt(document.getElementById("rFloor").value, 10) || 1, type: document.getElementById("rType").value, status: "clean", occupancy: "vacant", occStatus: "vacant", arrival: "", departure: "", guestName: "", bedConfig: "", notes: "", quirks: "", lastCleanedAt: null, lastDeepCleanAt: null, nextDeepCleanDue: null, photoUrls: [], active: true, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(function () { HK.audit("room.created", "Room " + num); HK.toast("Room added.", "success"); document.getElementById("rNum").value = ""; loadRoomList(); }).catch(function (err) { HK.toast("Add failed: " + err.message, "error"); }); };
      loadRoomList();
      function loadRoomList() { HK.col("rooms").where("active", "==", true).get().then(function (snap) { var el = document.getElementById("roomList"); el.innerHTML = ""; var arr = []; snap.forEach(function (d) { var r = d.data(); r.id = d.id; arr.push(r); }); arr.sort(function (a, b) { return (a.roomNumber > b.roomNumber) ? 1 : -1; }); if (!arr.length) { el.innerHTML = "<p class=\"muted small\">No rooms.</p>"; return; } arr.forEach(function (r) { var row = document.createElement("div"); row.className = "checkitem"; row.innerHTML = "<span class=\"grow\">Room " + HK.esc(r.roomNumber) + " <span class=\"tiny muted\">" + HK.esc(r.type) + " - floor " + r.floor + "</span></span>"; var del = document.createElement("button"); del.className = "btn btn-sm btn-danger"; del.textContent = "Deactivate"; del.onclick = function () { HK.confirm("Deactivate room " + r.roomNumber + "?", "It will be hidden from boards but its history is kept.", "Deactivate", true).then(function (go) { if (!go) { return; } HK.col("rooms").doc(r.id).update({ active: false }).then(function () { HK.audit("room.deactivated", "Room " + r.roomNumber); HK.toast("Deactivated.", "success"); loadRoomList(); }).catch(function (err) { HK.toast("Failed: " + err.message, "error"); }); }); }; row.appendChild(del); el.appendChild(row); }); }).catch(function (err) { document.getElementById("roomList").innerHTML = "<p class=\"muted\">" + HK.esc(err.message) + "</p>"; }); }
    }
    function renderUsers(p) {
      var note = document.createElement("div"); note.className = "card mb16"; note.innerHTML = "<div class=\"card-title\">Add a team member</div><p class=\"small\">Enter their name, email and role, then press Create. Their login is set up automatically and they are emailed a link to choose their own password - no Firebase Console step needed.</p>";
      var c = document.createElement("div"); c.className = "card"; c.innerHTML = "<div class=\"card-title\">New user</div><div class=\"field\"><label>Display name</label><input id=\"uName\"></div><div class=\"field\"><label>Email</label><input id=\"uEmail\" type=\"email\" autocomplete=\"off\"></div><div class=\"field\"><label>Role</label><select id=\"uRole\"><option value=\"housekeeper\">Housekeeper</option><option value=\"supervisor\">Supervisor</option><option value=\"admin\">Admin</option></select></div><button class=\"btn btn-accent btn-sm\" id=\"addUser\">Create user</button><div id=\"userList\" class=\"mt16\">Loading...</div>";
      p.appendChild(note); p.appendChild(c);
      document.getElementById("addUser").onclick = function () {
        var btn = this; var name = document.getElementById("uName").value.trim(); var email = document.getElementById("uEmail").value.trim(); var role = document.getElementById("uRole").value;
        if (!name || !email) { HK.toast("Enter a name and email.", "error"); return; }
        btn.disabled = true; btn.textContent = "Creating...";
        var user = firebase.auth().currentUser;
        if (!user) { btn.disabled = false; btn.textContent = "Create user"; HK.toast("Please sign in again.", "error"); return; }
        user.getIdToken().then(function (token) {
          return fetch("/api/create-user", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token }, body: JSON.stringify({ orgId: HK.state.orgId, hotelId: HK.state.hotelId, email: email, displayName: name, role: role }) });
        }).then(function (resp) {
          return resp.json().then(function (data) { return { ok: resp.ok, data: data }; });
        }).then(function (r) {
          if (!r.ok) { throw new Error((r.data && r.data.error) || "Could not create the user."); }
          // Ask Firebase to email the new user a link to set their own password.
          return auth.sendPasswordResetEmail(email).catch(function () {}).then(function () {
            HK.audit("user.created", name + " (" + role + ")");
            HK.toast("User created. They have been emailed a link to set their password.", "success");
            document.getElementById("uName").value = ""; document.getElementById("uEmail").value = "";
            btn.disabled = false; btn.textContent = "Create user";
            loadUserList();
          });
        }).catch(function (err) { btn.disabled = false; btn.textContent = "Create user"; HK.toast("Failed: " + err.message, "error"); });
      };
      loadUserList();
      function loadUserList() { HK.orgRef().collection("users").get().then(function (snap) { var el = document.getElementById("userList"); el.innerHTML = ""; snap.forEach(function (d) { var u = d.data(); var row = document.createElement("div"); row.className = "checkitem"; row.innerHTML = "<span class=\"grow\">" + HK.esc(u.displayName) + " <span class=\"tiny muted\">" + HK.esc(u.email) + " - " + HK.esc(u.role) + (u.active ? "" : " - inactive") + "</span></span>"; if (u.uid !== HK.state.user.uid) { var tog = document.createElement("button"); tog.className = "btn btn-sm btn-secondary"; tog.textContent = u.active ? "Deactivate" : "Reactivate"; tog.onclick = function () { HK.orgRef().collection("users").doc(u.uid).update({ active: !u.active }).then(function () { HK.audit("user.updated", u.displayName + " active=" + (!u.active)); HK.toast("Updated.", "success"); loadUserList(); }).catch(function (err) { HK.toast("Failed: " + err.message, "error"); }); }; row.appendChild(tog); } el.appendChild(row); }); }).catch(function (err) { document.getElementById("userList").innerHTML = "<p class=\"muted\">" + HK.esc(err.message) + "</p>"; }); }
    }
    function renderBranding(p) {
      var b = hotel.branding || {};
      var c = document.createElement("div"); c.className = "card"; c.innerHTML = "<div class=\"card-title\">Branding (white-label)</div><p class=\"small muted mb16\">Branding is stored at organisation level.</p><div class=\"field\"><label>App name</label><input id=\"bName\" value=\"" + HK.esc(b.appName || "Housekeeping Hub") + "\"></div><div class=\"field\"><label>Primary colour (hex)</label><input id=\"bColor\" value=\"" + HK.esc(b.primaryColor || "#0e9591") + "\"></div><div class=\"field\"><label>Logo URL</label><input id=\"bLogo\" value=\"" + HK.esc(b.logoUrl || "") + "\"></div><button class=\"btn btn-accent\" id=\"saveBrand\">Save branding</button>";
      p.appendChild(c);
      document.getElementById("saveBrand").onclick = function () { var btn = this; btn.disabled = true; btn.textContent = "Saving..."; HK.orgRef().update({ "branding.appName": document.getElementById("bName").value.trim(), "branding.primaryColor": document.getElementById("bColor").value.trim(), "branding.logoUrl": document.getElementById("bLogo").value.trim() }).then(function () { HK.audit("settings.changed", "Branding updated"); HK.toast("Branding saved. Reload to see changes.", "success"); btn.disabled = false; btn.textContent = "Save branding"; }).catch(function (err) { btn.disabled = false; btn.textContent = "Save branding"; HK.toast("Save failed: " + err.message, "error"); }); };
    }
    function renderExport(p) {
      var c = document.createElement("div"); c.className = "card"; c.innerHTML = "<div class=\"card-title\">Data export (GDPR)</div><p class=\"small muted mb16\">Download each collection as CSV.</p>";
      ["rooms", "assignments", "inspections", "deepcleans", "roomnotes", "documents"].forEach(function (col) { var b = document.createElement("button"); b.className = "btn btn-secondary btn-sm"; b.style.margin = "4px"; b.textContent = "Export " + col; b.onclick = function () { exportCol(col, b); }; c.appendChild(b); });
      p.appendChild(c);
    }
    function exportCol(col, btn) { btn.disabled = true; var old = btn.textContent; btn.textContent = "..."; HK.col(col).get().then(function (snap) { var rows = []; var keys = {}; snap.forEach(function (d) { var o = d.data(); Object.keys(o).forEach(function (k) { keys[k] = true; }); }); var cols = Object.keys(keys); rows.push(cols); snap.forEach(function (d) { var o = d.data(); rows.push(cols.map(function (k) { var v = o[k]; if (v && v.toDate) { v = v.toDate().toISOString(); } if (typeof v === "object") { v = JSON.stringify(v); } return v == null ? "" : v; })); }); var csv = rows.map(function (r) { return r.map(function (cc) { return "\"" + String(cc).replace(/\"/g, "\"\"") + "\""; }).join(","); }).join("\n"); var blob = new Blob([csv], { type: "text/csv" }); var url = URL.createObjectURL(blob); var a = document.createElement("a"); a.href = url; a.download = col + ".csv"; a.click(); URL.revokeObjectURL(url); btn.disabled = false; btn.textContent = old; }).catch(function (err) { btn.disabled = false; btn.textContent = old; HK.toast("Export failed: " + err.message, "error"); }); }
    function renderAudit(p) {
      var c = document.createElement("div"); c.className = "card";
      c.innerHTML = "<div class=\"card-title\">Audit log (read-only)</div>" +
        "<div class=\"row wrap mb16\">" +
        "<div class=\"field\" style=\"margin-bottom:0;\"><label class=\"tiny\">From</label><input type=\"date\" id=\"aFrom\"></div>" +
        "<div class=\"field\" style=\"margin-bottom:0;\"><label class=\"tiny\">To</label><input type=\"date\" id=\"aTo\"></div>" +
        "<div class=\"field grow\" style=\"margin-bottom:0;\"><label class=\"tiny\">Action contains</label><input id=\"aAction\" placeholder=\"e.g. room, user, inspection\"></div>" +
        "<button class=\"btn btn-sm btn-accent\" id=\"aApply\">Apply</button>" +
        "</div>" +
        "<div class=\"table-wrap\"><table><thead><tr><th>When</th><th>Action</th><th>Detail</th><th>Actor</th></tr></thead><tbody id=\"auditBody\"><tr><td colspan=\"4\">Loading...</td></tr></tbody></table></div>";
      p.appendChild(c);
      document.getElementById("aApply").onclick = loadAudit;
      loadAudit();
      function tsStart(s) { return firebase.firestore.Timestamp.fromDate(new Date(s + "T00:00:00")); }
      function tsEnd(s) { return firebase.firestore.Timestamp.fromDate(new Date(s + "T23:59:59")); }
      function loadAudit() {
        var from = document.getElementById("aFrom").value, to = document.getElementById("aTo").value;
        var action = (document.getElementById("aAction").value || "").trim().toLowerCase();
        var q = HK.orgRef().collection("auditlog");
        if (from) { q = q.where("createdAt", ">=", tsStart(from)); }
        if (to) { q = q.where("createdAt", "<=", tsEnd(to)); }
        q = q.orderBy("createdAt", "desc").limit(500);
        document.getElementById("auditBody").innerHTML = "<tr><td colspan=\"4\">Loading...</td></tr>";
        q.get().then(function (snap) {
          var tb = document.getElementById("auditBody"); tb.innerHTML = "";
          var shown = 0;
          snap.forEach(function (d) {
            var a = d.data();
            if (action && String(a.action || "").toLowerCase().indexOf(action) === -1) { return; }
            shown++;
            var tr = document.createElement("tr");
            tr.innerHTML = "<td class=\"tiny\">" + HK.fmtDateTime(a.createdAt) + "</td><td>" + HK.esc(a.action) + "</td><td>" + HK.esc(a.detail) + "</td><td>" + HK.esc(a.actorName) + "</td>";
            tb.appendChild(tr);
          });
          if (!shown) { tb.innerHTML = "<tr><td colspan=\"4\" class=\"muted\">No matching audit entries.</td></tr>"; }
        }).catch(function (err) { document.getElementById("auditBody").innerHTML = "<tr><td colspan=\"4\" class=\"muted\">" + HK.esc(err.message) + "</td></tr>"; });
      }
    }
  })();
  </script>
</body>
</html>
