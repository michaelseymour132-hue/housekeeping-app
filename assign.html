<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assign - Housekeeping Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <style> .sel-room { cursor:pointer; } .sel-room.picked { outline:3px solid var(--accent); } </style>
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-head"><div class="titles"><div class="breadcrumb">Housekeeping Hub</div><h1>Assign rooms</h1></div></div>
      <div class="card mb16">
        <div class="field-row">
          <div class="field"><label>Date</label><input type="date" id="date"></div>
          <div class="field"><label>Assign to</label><select id="hk"></select></div>
          <div class="field"><label>Type</label><select id="type"><option value="daily">Daily clean</option><option value="deepclean">Deep clean</option><option value="reclean">Re-clean</option></select></div>
        </div>
        <div class="row wrap"><button class="btn btn-secondary btn-sm" id="copyYest">Copy yesterday</button><button class="btn btn-secondary btn-sm" id="selectAll">Select all dirty</button><button class="btn btn-secondary btn-sm" id="clearSel">Clear</button></div>
      </div>
      <div class="card mb16"><div class="card-title">Workload for selected date</div><div id="workload" class="row wrap small">Loading...</div></div>
      <div class="card">
        <div class="row mb16"><strong class="grow" id="selCount">0 rooms selected</strong><button class="btn btn-accent" id="assignBtn">Assign selected</button></div>
        <div id="grid" class="room-grid"></div>
      </div>
    </main>
  </div>
  <div id="toast-host"></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script>
  (function () {
    var rooms = [], users = [], picked = {}, assignmentsForDate = [];
    HK.requireAuth(["admin", "supervisor"], function (state) {
      if (!state.hotelId) { window.location.href = "onboarding.html"; return; }
      HK.mount("assign");
      document.getElementById("date").value = HK.todayStr();
      loadUsers().then(loadRooms).then(function () { loadAssignmentsForDate(); });
    });
    document.getElementById("date").onchange = function () { loadAssignmentsForDate(); };
    document.getElementById("copyYest").onclick = copyYesterday;
    document.getElementById("selectAll").onclick = function () { rooms.forEach(function (r) { if (r.status === "dirty") { picked[r.id] = true; } }); renderGrid(); updateCount(); };
    document.getElementById("clearSel").onclick = function () { picked = {}; renderGrid(); updateCount(); };
    document.getElementById("assignBtn").onclick = doAssign;
    function loadUsers() {
      return HK.orgRef().collection("users").where("active", "==", true).get().then(function (snap) {
        users = []; var sel = document.getElementById("hk"); sel.innerHTML = "";
        snap.forEach(function (d) { var u = d.data(); if ((u.hotelIds || []).indexOf(HK.state.hotelId) !== -1) { users.push(u); var o = document.createElement("option"); o.value = u.uid; o.textContent = u.displayName + " (" + u.role + ")"; sel.appendChild(o); } });
        if (!users.length) { HK.toast("No staff found. Add users in Settings.", "info"); }
      });
    }
    function loadRooms() {
      return HK.col("rooms").where("active", "==", true).get().then(function (snap) {
        rooms = []; snap.forEach(function (d) { var r = d.data(); r.id = d.id; rooms.push(r); });
        rooms.sort(function (a, b) { return (a.roomNumber > b.roomNumber) ? 1 : -1; }); renderGrid();
      });
    }
    function loadAssignmentsForDate() {
      var date = document.getElementById("date").value;
      HK.col("assignments").where("date", "==", date).get().then(function (snap) {
        assignmentsForDate = []; snap.forEach(function (d) { assignmentsForDate.push(d.data()); });
        renderWorkload(); renderGrid();
      }).catch(function (err) { HK.toast("Could not load assignments: " + err.message, "error"); });
    }
    function renderWorkload() {
      var counts = {}; assignmentsForDate.forEach(function (a) { counts[a.assignedToUid] = (counts[a.assignedToUid] || 0) + 1; });
      var host = document.getElementById("workload"); host.innerHTML = "";
      if (!users.length) { host.textContent = "No staff."; return; }
      users.forEach(function (u) { var span = document.createElement("span"); span.className = "badge badge-blue"; span.textContent = u.displayName + ": " + (counts[u.uid] || 0); host.appendChild(span); });
    }
    function renderGrid() {
      var assignedRoomIds = {}; assignmentsForDate.forEach(function (a) { assignedRoomIds[a.roomId] = a.assignedToName; });
      var grid = document.getElementById("grid"); grid.innerHTML = "";
      rooms.forEach(function (r) {
        var t = document.createElement("div"); t.className = "room-tile sel-room st-" + r.status + (picked[r.id] ? " picked" : "");
        var tag = assignedRoomIds[r.id] ? "<span class=\"tiny\">" + HK.esc(assignedRoomIds[r.id]) + "</span>" : "<span class=\"rt\">" + HK.esc(r.type) + "</span>";
        t.innerHTML = "<span class=\"rn\">" + HK.esc(r.roomNumber) + "</span>" + tag;
        t.onclick = function () { picked[r.id] = !picked[r.id]; if (!picked[r.id]) { delete picked[r.id]; } t.className = "room-tile sel-room st-" + r.status + (picked[r.id] ? " picked" : ""); updateCount(); };
        grid.appendChild(t);
      });
    }
    function updateCount() { document.getElementById("selCount").textContent = Object.keys(picked).length + " rooms selected"; }
    function doAssign() {
      var ids = Object.keys(picked); if (!ids.length) { HK.toast("Select at least one room.", "error"); return; }
      var hkUid = document.getElementById("hk").value; if (!hkUid) { HK.toast("Choose a staff member.", "error"); return; }
      var hkUser = users.filter(function (u) { return u.uid === hkUid; })[0]; var date = document.getElementById("date").value; var type = document.getElementById("type").value;
      var dupes = ids.filter(function (id) { return assignmentsForDate.some(function (a) { return a.roomId === id; }); });
      var proceed = Promise.resolve(true);
      if (dupes.length) { proceed = HK.confirm("Duplicate assignments", dupes.length + " of the selected rooms are already assigned on this date. Assign anyway?", "Assign anyway", false); }
      proceed.then(function (go) {
        if (!go) { return; }
        var btn = document.getElementById("assignBtn"); btn.disabled = true; btn.textContent = "Assigning...";
        HK.hotelRef().get().then(function (hd) {
          var checklist = ((hd.data().settings || {}).dailyChecklist || []).map(function (i) { return { item: i, done: false }; });
          if (type === "deepclean") { checklist = ((hd.data().settings || {}).deepCleanChecklist || []).map(function (i) { return { item: i, done: false }; }); }
          var b = db.batch();
          ids.forEach(function (id) {
            var r = rooms.filter(function (x) { return x.id === id; })[0];
            var ref = HK.col("assignments").doc();
            b.set(ref, { date: date, roomId: id, roomNumber: r.roomNumber, assignedToUid: hkUid, assignedToName: hkUser.displayName, type: type, status: "pending", startedAt: null, completedAt: null, durationMinutes: null, checklist: checklist, createdByUid: HK.state.user.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          });
          return b.commit();
        }).then(function () {
          HK.audit("assignment.created", ids.length + " rooms assigned to " + hkUser.displayName + " on " + date);
          HK.toast(ids.length + " rooms assigned to " + hkUser.displayName + ".", "success");
          picked = {}; updateCount(); loadAssignmentsForDate();
          document.getElementById("assignBtn").disabled = false; document.getElementById("assignBtn").textContent = "Assign selected";
        }).catch(function (err) { document.getElementById("assignBtn").disabled = false; document.getElementById("assignBtn").textContent = "Assign selected"; HK.toast("Assign failed: " + err.message, "error"); });
      });
    }
    function copyYesterday() {
      var date = document.getElementById("date").value; var d = new Date(date + "T00:00:00"); var y = HK.dateStr(HK.addDays(d, -1));
      HK.col("assignments").where("date", "==", y).get().then(function (snap) {
        if (snap.empty) { HK.toast("No assignments found for " + y + ".", "info"); return; }
        var b = db.batch(); var n = 0;
        snap.forEach(function (doc) { var a = doc.data(); var exists = assignmentsForDate.some(function (x) { return x.roomId === a.roomId; }); if (exists) { return; } n++; var ref = HK.col("assignments").doc(); b.set(ref, { date: date, roomId: a.roomId, roomNumber: a.roomNumber, assignedToUid: a.assignedToUid, assignedToName: a.assignedToName, type: a.type, status: "pending", startedAt: null, completedAt: null, durationMinutes: null, checklist: (a.checklist || []).map(function (c) { return { item: c.item, done: false }; }), createdByUid: HK.state.user.uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); });
        if (!n) { HK.toast("Everything from yesterday is already assigned.", "info"); return; }
        b.commit().then(function () { HK.audit("assignment.created", "Copied " + n + " assignments from " + y); HK.toast("Copied " + n + " assignments from yesterday.", "success"); loadAssignmentsForDate(); }).catch(function (err) { HK.toast("Copy failed: " + err.message, "error"); });
      }).catch(function (err) { HK.toast("Could not read yesterday: " + err.message, "error"); });
    }
  })();
  </script>
</body>
</html>
