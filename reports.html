<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Housekeeping Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-head"><div class="titles"><div class="breadcrumb">Housekeeping Hub</div><h1>Reports</h1></div><button class="btn btn-secondary right no-print" onclick="window.print()">Print</button></div>
      <div class="card mb16 no-print"><div class="row wrap">
        <button class="btn btn-sm btn-secondary" data-preset="today">Today</button>
        <button class="btn btn-sm btn-secondary" data-preset="7">7 days</button>
        <button class="btn btn-sm btn-secondary" data-preset="30">30 days</button>
        <div class="field" style="margin-bottom:0;"><label class="tiny">From</label><input type="date" id="from"></div>
        <div class="field" style="margin-bottom:0;"><label class="tiny">To</label><input type="date" id="to"></div>
        <button class="btn btn-sm btn-accent" id="run">Run</button>
      </div></div>
      <div class="kpi-grid" id="kpis"></div>
      <div class="card mb16"><div class="card-title">Cleans per day</div><div id="chart"></div></div>
      <div class="card"><div class="row mb16"><div class="card-title grow">Housekeeper performance</div><button class="btn btn-sm btn-secondary no-print" id="csv">Export CSV</button></div><div class="table-wrap"><table id="perf"><thead><tr><th>Housekeeper</th><th>Rooms done</th><th>Avg time (min)</th><th>Pass rate</th></tr></thead><tbody></tbody></table></div></div>
    </main>
  </div>
  <div id="toast-host"></div>
  <script src="js/firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script>
  (function () {
    var perfData = [];
    HK.requireAuth(["admin", "supervisor"], function (state) {
      if (!state.hotelId) { window.location.href = "onboarding.html"; return; }
      HK.mount("reports");
      setPreset("7"); run();
    });
    var presetBtns = document.querySelectorAll("[data-preset]");
    for (var i = 0; i < presetBtns.length; i++) { presetBtns[i].onclick = (function (b) { return function () { setPreset(b.getAttribute("data-preset")); run(); }; })(presetBtns[i]); }
    document.getElementById("run").onclick = run;
    document.getElementById("csv").onclick = exportCsv;
    function setPreset(p) {
      var to = new Date(); var from = new Date();
      if (p === "today") { } else if (p === "7") { from = HK.addDays(to, -6); } else if (p === "30") { from = HK.addDays(to, -29); }
      document.getElementById("from").value = HK.dateStr(from); document.getElementById("to").value = HK.dateStr(to);
    }
    function run() {
      var from = document.getElementById("from").value, to = document.getElementById("to").value;
      if (!from || !to || from > to) { HK.toast("Check your date range.", "error"); return; }
      HK.col("assignments").where("date", ">=", from).where("date", "<=", to).get().then(function (snap) {
        var assigns = []; snap.forEach(function (d) { assigns.push(d.data()); });
        return HK.col("inspections").where("createdAt", ">=", dayStart(from)).where("createdAt", "<=", dayEnd(to)).get().then(function (isnap) {
          var insp = []; isnap.forEach(function (d) { insp.push(d.data()); });
          compute(assigns, insp, from, to);
        });
      }).catch(function (err) { HK.toast("Report failed: " + err.message + " (a Firestore index link may be in the console)", "error"); });
    }
    function dayStart(s) { var d = new Date(s + "T00:00:00"); return firebase.firestore.Timestamp.fromDate(d); }
    function dayEnd(s) { var d = new Date(s + "T23:59:59"); return firebase.firestore.Timestamp.fromDate(d); }
    function compute(assigns, insp, from, to) {
      var completed = assigns.filter(function (a) { return a.status === "complete"; });
      var durs = completed.filter(function (a) { return a.durationMinutes; }).map(function (a) { return a.durationMinutes; });
      var avg = durs.length ? Math.round(durs.reduce(function (x, y) { return x + y; }, 0) / durs.length) : 0;
      var pass = insp.filter(function (x) { return x.result === "pass"; }).length; var passRate = insp.length ? Math.round(pass / insp.length * 100) : 0;
      var kpis = document.getElementById("kpis"); kpis.innerHTML = "";
      addKpi(kpis, completed.length, "Rooms cleaned"); addKpi(kpis, avg + " min", "Avg clean time"); addKpi(kpis, passRate + "%", "Inspection pass rate"); addKpi(kpis, insp.length, "Inspections");
      // chart: cleans per day
      var byDay = {}; completed.forEach(function (a) { byDay[a.date] = (byDay[a.date] || 0) + 1; });
      var days = Object.keys(byDay).sort(); var maxV = 1; days.forEach(function (d) { if (byDay[d] > maxV) { maxV = byDay[d]; } });
      var chart = document.getElementById("chart");
      if (!days.length) { chart.innerHTML = "<div class=\"empty\"><div class=\"empty-icon\">\u2637</div><div>No completed cleans in this range.</div></div>"; }
      else { var bw = 100 / days.length; var svg = "<svg viewBox=\"0 0 100 40\" preserveAspectRatio=\"none\" style=\"width:100%;height:160px;\">"; days.forEach(function (d, idx) { var h = byDay[d] / maxV * 36; svg += "<rect x=\"" + (idx * bw + bw * 0.15) + "\" y=\"" + (38 - h) + "\" width=\"" + (bw * 0.7) + "\" height=\"" + h + "\" fill=\"#0e9591\"></rect>"; }); svg += "</svg>"; chart.innerHTML = svg + "<div class=\"tiny muted\">" + days[0] + " to " + days[days.length - 1] + " (max " + maxV + "/day)</div>"; }
      // per-housekeeper
      var byHk = {}; completed.forEach(function (a) { var k = a.assignedToUid; if (!byHk[k]) { byHk[k] = { name: a.assignedToName, count: 0, durs: [] }; } byHk[k].count++; if (a.durationMinutes) { byHk[k].durs.push(a.durationMinutes); } });
      // Attribute inspections to the housekeeper who did the clean (inspections now
      // carry assignedToUid). Inspections recorded before this field existed have no
      // uid and are simply not attributed, so a housekeeper's pass rate is accurate.
      var inspByHk = {}; insp.forEach(function (x) { if (!x.assignedToUid) { return; } inspByHk[x.assignedToUid] = inspByHk[x.assignedToUid] || []; inspByHk[x.assignedToUid].push(x.result); });
      var tbody = document.querySelector("#perf tbody"); tbody.innerHTML = ""; perfData = [];
      Object.keys(byHk).forEach(function (k) { var h = byHk[k]; var a = h.durs.length ? Math.round(h.durs.reduce(function (x, y) { return x + y; }, 0) / h.durs.length) : 0;
        var results = inspByHk[k] || []; var total = results.length; var passed = results.filter(function (res) { return res === "pass"; }).length;
        var pr = total ? Math.round(passed / total * 100) + "%" : "-";
        perfData.push([h.name, h.count, a, pr]);
        var tr = document.createElement("tr"); tr.innerHTML = "<td>" + HK.esc(h.name) + "</td><td>" + h.count + "</td><td>" + a + "</td><td>" + pr + "</td>"; tbody.appendChild(tr); });
      if (!perfData.length) { tbody.innerHTML = "<tr><td colspan=\"4\" class=\"muted\">No data in this range.</td></tr>"; }
    }
    function addKpi(host, val, label) { var d = document.createElement("div"); d.className = "kpi"; d.innerHTML = "<div class=\"kpi-val\">" + val + "</div><div class=\"kpi-label\">" + label + "</div>"; host.appendChild(d); }
    function exportCsv() {
      if (!perfData.length) { HK.toast("Nothing to export.", "info"); return; }
      var rows = [["Housekeeper", "Rooms done", "Avg time (min)", "Pass rate"]].concat(perfData);
      var csv = rows.map(function (r) { return r.map(function (c) { return "\"" + String(c).replace(/\"/g, "\"\"") + "\""; }).join(","); }).join("\n");
      var blob = new Blob([csv], { type: "text/csv" }); var url = URL.createObjectURL(blob); var a = document.createElement("a"); a.href = url; a.download = "housekeeper-performance.csv"; a.click(); URL.revokeObjectURL(url);
    }
  })();
  </script>
</body>
</html>
